spring:
  application:
    name: classboard-backend
  
  # 数据源配置 (开发环境使用H2，生产环境切换为MySQL)
  datasource:
    url: jdbc:h2:mem:classboard;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  # H2控制台(仅开发环境)
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/*.xml

# JWT配置
jwt:
  secret: classboard-secret-key-2024-very-long-secret-key-for-jwt-token-generation
  expiration: 86400000  # 24小时

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api

# 天气API配置
weather:
  api-url: https://api.openweathermap.org/data/2.5/weather
  api-key: your-api-key-here

# 日志配置
logging:
  level:
    com.school.classboard: DEBUG
    org.springframework.security: DEBUG
